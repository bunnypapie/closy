<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Closy - ตู้เสื้อผ้า</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body data-page="wardrobe">
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="logo" href="index.html"><span class="logo-badge">C</span><span>Closy</span></a>
      <nav class="main-nav">
        <a href="index.html">หน้าแรก</a>
        <a href="upload.html">อัปโหลด</a>
        <a href="wardrobe.html" class="active">ตู้เสื้อผ้า</a>
        <a href="generate.html">จัดชุด</a>
        <a href="saved.html">ชุดที่บันทึก</a>
        <a href="login.html">เข้าสู่ระบบ</a>
      </nav>
      <div class="nav-user" id="navUserBox"></div>
    </div>
  </header>

  <main class="container page-section">
    <div class="section-title-row">
      <div>
        <h1>My Wardrobe</h1>
        <p class="subtle">จัดการเสื้อผ้าทั้งหมด ค้นหา กรอง แก้ไข และลบได้จริง</p>
      </div>
      <a class="btn btn-primary" href="upload.html">+ เพิ่มเสื้อผ้า</a>
    </div>

    <section class="card filter-card">
      <div class="filter-grid">
        <div class="field">
          <label for="filterCategory">หมวดหลัก</label>
          <select id="filterCategory">
            <option value="all">ทั้งหมด</option>
            <option value="Top">Top</option>
            <option value="Bottom">Bottom</option>
            <option value="Shoes">Shoes</option>
            <option value="Outerwear">Outerwear</option>
          </select>
        </div>
        <div class="field">
          <label for="filterMood">Mood</label>
          <select id="filterMood"></select>
        </div>
        <div class="field">
          <label for="filterOccasion">Occasion</label>
          <select id="filterOccasion"></select>
        </div>
        <div class="field">
          <label for="searchWardrobe">ค้นหาด้วยชื่อ</label>
          <input id="searchWardrobe" type="text" placeholder="พิมพ์ชื่อเสื้อผ้า" />
        </div>
      </div>
    </section>

    <section id="wardrobeList" class="wardrobe-grid"></section>
  </main>

  <div class="modal hidden" id="editModal">
    <div class="modal-content large-modal">
      <div class="modal-header">
        <h2>แก้ไขข้อมูลเสื้อผ้า</h2>
        <button class="icon-btn" id="closeEditModal">✕</button>
      </div>
      <form id="editItemForm" class="form-grid"></form>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container footer-wrap">
      <span>Closy — เสื้อผ้าทุกชิ้นของคุณอยู่ที่นี่</span>
      <span id="syncFooterStatus"></span>
    </div>
  </footer>

  <div id="toastContainer" class="toast-container"></div>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/wardrobe.js"></script>
</body>
</html>
